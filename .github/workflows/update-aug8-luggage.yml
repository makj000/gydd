name: Update Aug 8 luggage storage

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-aug8-luggage.yml'

permissions:
  contents: write

jobs:
  update-page:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Aug 8 luggage storage
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('t/2026-austria-czech-7f4c9b2e6a31d8/index.html')
          text = page.read_text(encoding='utf-8')

          old = ('🧳 <strong>行李安排：</strong>✅ <strong>首选：</strong>先询问 The Julius Prague 前台是否可以免费寄存行李；'
                 '📦 <strong>备选：</strong><a href="https://www.google.com/maps/dir/?api=1&origin=Senov%C3%A1%C5%BEn%C3%A9%20n%C3%A1m.%20993%2F3%2C%20110%2000%20Prague%201%2C%20Czech%20Republic&destination=EasyLocker%2C%20Prokopsk%C3%A1%20625%2F3%2C%20118%2000%20Prague%201%2C%20Czech%20Republic&travelmode=walking" target="_blank" rel="noreferrer">EasyLocker Malá Strana（Prokopská 625/3）</a>，'
                 '从酒店步行约 25 到 30 分钟、约 2 公里，实际路线以地图为准；营业时间 9:00-20:00，可现场刷卡，也可线上预留。'
                 '若直接去机场🛫，没必要存包。')

          maps = 'https://www.google.com/maps/search/?api=1&query=EasyLocker%20Mal%C3%A1%20Strana%2C%20Prague%2C%20Czech%20Republic'
          new = ('🧳 <strong>行李安排：</strong>✅ <strong>首选：</strong>优先使用 The Julius Prague 酒店前台行李寄存；'
                 '📦 <strong>备选：</strong><a href="' + maps + '" target="_blank" rel="noreferrer">EasyLocker（Malá Strana，Google Maps）</a>，'
                 '步行约 5 到 8 分钟、约 400 到 600 米，实际路线以地图为准。'
                 '若直接去机场🛫，没必要存包。')

          if old not in text:
              raise SystemExit('Expected Aug 8 luggage text not found; no changes made.')

          page.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/update-aug8-luggage.yml').unlink()
          PY
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add t/2026-austria-czech-7f4c9b2e6a31d8/index.html .github/workflows/update-aug8-luggage.yml
          git commit -m 'Update Aug 8 luggage storage guidance'
          git push
